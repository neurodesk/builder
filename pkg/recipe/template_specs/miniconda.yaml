# Instructions to install Miniconda.

name: miniconda
url: https://docs.conda.io/projects/miniconda/en/latest/
binaries:
  urls:
    latest: https://repo.anaconda.com/miniconda/Miniconda3-{{ self.installer_version }}-Linux-{{ self.arch }}.sh
    "*": https://repo.anaconda.com/miniconda/Miniconda3-{{ self.installer_version }}-Linux-{{ self.arch }}.sh
  env:
    CONDA_DIR: "{{ self.install_path }}"
    PATH: "{{ self.install_path }}/condabin:{{ self.install_path }}/bin:$PATH"
  dependencies:
    apt:
      - bzip2
      - ca-certificates
      - curl
    yum:
      - bzip2
      - curl
  arguments:
    required:
      - version
    optional:
      install_path: /opt/miniconda-{{ self.version }}
      installer_version: "{{ self.version }}"
      # We do not use a boolean type here because all keywords to the templates are
      # expected to be strings.
      installed: "false"
      env_name: base
      env_exists: "true"
      conda_install: ""
      pip_install: ""
      conda_opts: ""
      pip_opts: ""
      yaml_file: ""
      # Default to libmamba solver for faster/more reliable solves
      mamba: "true"
  instructions: |
    {% if not self.installed.lower() in ["true", "y", "1"] -%}
    {{ self.install_dependencies() }}
    # Install dependencies.
    export PATH="{{ self.install_path }}/condabin:{{ self.install_path }}/bin:$PATH"
    echo "Downloading Miniconda installer ..."
    conda_installer="/tmp/miniconda.sh"
    curl -fsSL -o "$conda_installer" {{ self.urls["*"] }}
    bash "$conda_installer" -b -p {{ self.install_path }}
    rm -f "$conda_installer"
    # Accept terms automatically. The command might not exist on older conda versions so don't fail.
    {{ self.install_path }}/condabin/conda tos accept || true
    {% if self.version == "latest" -%}
    {{ self.install_path }}/condabin/conda update -yq -nbase conda
    {% endif -%}
    {% if self.mamba == "true" -%}
    {{ self.install_path }}/condabin/conda install -yq -nbase conda-libmamba-solver
    # Use libmamba solver by default if installed. Might not be available on older conda versions so don't fail.
    {{ self.install_path }}/condabin/conda config --set solver libmamba || true
    {% endif -%}
    # Prefer packages in conda-forge
    {{ self.install_path }}/condabin/conda config --system --prepend channels conda-forge
    # Packages in lower-priority channels not considered if a package with the same
    # name exists in a higher priority channel. Can dramatically speed up installations.
    # Conda recommends this as a default
    # https://docs.conda.io/projects/conda/en/latest/user-guide/tasks/manage-channels.html
    {{ self.install_path }}/condabin/conda config --set channel_priority strict
    {{ self.install_path }}/condabin/conda config --system --set auto_update_conda false
    {{ self.install_path }}/condabin/conda config --system --set show_channel_urls true
    # Enable `conda activate`
    {{ self.install_path }}/condabin/conda init bash
    {% endif -%}
    {% if self.yaml_file -%}
    {% if self.env_name == "base" %}{{ raise("Environment name cannot be 'base' if creating an environment from a YAML file.") }}{% endif -%}
    {{ self.install_path }}/condabin/conda env create {{ self.conda_opts|default("-q") }} --name {{ self.env_name }} --file {{ self.yaml_file }}
    {% elif self.env_exists.lower() not in ["true", "y", "1"] -%}
    if [ "{{ self.env_name }}" != "base" ]; then {{ self.install_path }}/condabin/conda create -y {{ self.conda_opts|default("-q") }} --name {{ self.env_name }}; fi
    {% endif -%}
    {% if self.conda_install -%}
    {{ self.install_path }}/condabin/conda install -y {{ self.conda_opts|default("-q") }} --name {{ self.env_name }} \
    {%- for pkg in self.conda_install.split() %}
        {% if not loop.last -%}
        "{{ pkg }}" \
        {%- else -%}
        "{{ pkg }}"
        {%- endif -%}
    {% endfor %}
    {% endif -%}
    {% if self.pip_install -%}
    {{ self.install_path }}/condabin/conda run --no-capture-output --name {{ self.env_name }} python -m pip install --no-cache-dir {{ self.pip_opts }} \
      {%- for pkg in self.pip_install.split() %}
          {% if not loop.last -%}
          "{{ pkg }}" \
          {%- else -%}
          "{{ pkg }}"
          {%- endif -%}
      {% endfor %}
    {% endif -%}
    # Clean up
    sync && {{ self.install_path }}/condabin/conda clean --all --yes && sync
    rm -rf ~/.cache/pip/*
