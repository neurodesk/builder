builder: neurodocker
directives:
- environment:
    PATH: '{{ self.install_path }}/bin:$PATH'
- run:
  - '{{ self.install_dependencies() }}'
  - echo "Downloading PETPVC ..."
  - mkdir -p {{ self.install_path }}
  - |
    curl -fL {{ self.urls[self.version] }} \
    | tar -xz -C {{ self.install_path }} --strip-components 1
