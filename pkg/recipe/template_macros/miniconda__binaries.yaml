builder: neurodocker
directives:
- environment:
    CONDA_DIR: '{{ self.install_path }}'
    PATH: '{{ self.install_path }}/bin:$PATH'
- variables:
    conda_opts: '{{ self.conda_opts|default("-q") }}'
    installer_path: /tmp/miniconda.sh
    installer_url: '{{ self.urls["*"] }}'
- condition: self.installed.lower() not in ["true", "y", "1"]
  run:
  - '{{ self.install_dependencies() }}'
  - export PATH="{{ self.install_path }}/bin:$PATH"
  - echo "Downloading Miniconda installer ..."
  - curl -fsSL -o {{ installer_path }} {{ installer_url }}
  - bash {{ installer_path }} -b -p {{ self.install_path }}
  - rm -f {{ installer_path }}
  - conda tos accept || true
- condition: self.installed.lower() not in ["true", "y", "1"] and self.version == "latest"
  run:
  - conda update -yq -nbase conda
- condition: self.installed.lower() not in ["true", "y", "1"] and self.mamba == "true"
  run:
  - conda install -yq -nbase conda-libmamba-solver
  - conda config --set solver libmamba || true
- condition: self.installed.lower() not in ["true", "y", "1"]
  run:
  - conda config --system --prepend channels conda-forge
  - conda config --set channel_priority strict
  - conda config --system --set auto_update_conda false
  - conda config --system --set show_channel_urls true
  - conda init bash
- condition: self.yaml_file
  run:
  - |
    {% if self.env_name == "base" %}{{ raise("Environment name cannot be 'base' if creating an environment from a YAML file.") }}{% endif -%}
  - conda env create {{ conda_opts }} --name {{ self.env_name }} --file {{ self.yaml_file }}
- condition: not self.yaml_file and self.env_exists.lower() not in ["true", "y", "1"]
  run:
  - conda create -y {{ conda_opts }} --name {{ self.env_name }}
- condition: self.conda_install
  run:
  - |
    conda install -y {{ conda_opts }} --name {{ self.env_name }} \
    {%- for pkg in self.conda_install.split() %}
        {% if not loop.last -%}
        "{{ pkg }}" \
        {%- else -%}
        "{{ pkg }}"
        {%- endif -%}
    {% endfor %}
- condition: self.pip_install
  run:
  - |
    bash -c "source activate {{ self.env_name }}
      python -m pip install --no-cache-dir {{ self.pip_opts }} \
      {%- for pkg in self.pip_install.split() %}
          {% if not loop.last -%}
          "{{ pkg }}" \
          {%- else -%}
          "{{ pkg }}"
          {%- endif -%}
      {% endfor %}"
- condition: self.installed.lower() not in ["true", "y", "1"] or self.conda_install or self.pip_install or self.yaml_file or self.env_exists.lower() not in ["true", "y", "1"]
  run:
  - sync && conda clean --all --yes && sync
  - rm -rf ~/.cache/pip/*
