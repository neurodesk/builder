builder: neurodocker
directives:
- condition: self.pkg_manager == "apt"
  variables:
    node_setup_script_name: nsolid_setup_deb.sh
    node_setup_script_url: https://deb.nodesource.com/nsolid_setup_deb.sh
    node_install_package: nodejs
- condition: self.pkg_manager == "yum"
  variables:
    node_setup_script_name: nsolid_setup_rpm.sh
    node_setup_script_url: https://rpm.nodesource.com/nsolid_setup_rpm.sh
    node_install_package: nodejs --setopt=nodesource-nodejs.module_hotfixes=1
- run:
  - |
    if command -v node >/dev/null 2>&1; then
      echo "node is installed, skipping its install."
    else \
      {{ self.install_dependencies() }}
      curl -fsSL -o {{ node_setup_script_name }} {{ node_setup_script_url }}
      chmod 500 {{ node_setup_script_name }}
      ./{{ node_setup_script_name }} {{ self.node_version }}
      {{ self.install([node_install_package]) }}
    fi
  - node --version
  - npm --version
  - npm install -g bids-validator@{{ self.version }}
